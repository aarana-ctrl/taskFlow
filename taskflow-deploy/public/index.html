<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ECEEF1">
<title>TaskFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg:    #EAEAEB;
  --card:  #FFFFFF;
  --navy:  #0D1117;
  --text:  #1A1D23;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --green: #22C55E;
  --green-l: #DCFCE7;
  --red:   #EF4444;
  --red-l: #FEE2E2;
  --amber: #F59E0B;
  --amber-l: #FEF3C7;
  --blue:  #6366F1;
  --blue-l:#EEF2FF;
  --border:rgba(0,0,0,.055);
  --r:     16px;
  --r-sm:  10px;
  --r-pill:40px;
  --sh:    0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --sh-lg: 0 8px 40px rgba(0,0,0,.13), 0 2px 8px rgba(0,0,0,.06);
  --nav-h: 0px;
  --hdr-h: 0px;
}
html { height:100%; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
}
#root { position:fixed; inset:0; overflow:hidden; }
input,textarea,select,button { font-family:inherit; }
input,textarea { border:none; outline:none; background:transparent; color:inherit; }
input::placeholder,textarea::placeholder { color:var(--text3); }
button { cursor:pointer; border:none; background:none; color:inherit; }
::-webkit-scrollbar { width:0; height:0; }
a { color:inherit; text-decoration:none; }

/* ══ ANIMATIONS ══════════════════════════════════════════════ */
@keyframes fadeIn   { from{opacity:0}                        to{opacity:1} }
@keyframes viewIn   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideUp  { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes sheetUp  { from{transform:translateY(100%)}       to{transform:translateY(0)} }
@keyframes slideRight{from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes spin     { to{transform:rotate(360deg)} }
@keyframes popIn    { 0%{transform:scale(.9);opacity:0} 60%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
@keyframes checkBounce { 0%{transform:scale(0.6)} 55%{transform:scale(1.25)} 75%{transform:scale(0.9)} 100%{transform:scale(1)} }
@keyframes completeFade { from{opacity:1} to{opacity:.5} }
@keyframes strikein { from{width:0} to{width:100%} }

.a-fade   { animation:fadeIn .2s ease both }
.a-view   { animation:viewIn .32s cubic-bezier(0.16,1,0.3,1) both }
.a-up     { animation:slideUp .28s cubic-bezier(0.16,1,0.3,1) both }
.a-sheet  { animation:sheetUp .36s cubic-bezier(.25,1,.3,1) both }
.a-right  { animation:slideRight .28s cubic-bezier(0.16,1,0.3,1) both }
.a-pop    { animation:popIn .35s cubic-bezier(.175,.885,.32,1.275) both }
.spinning { animation:spin .8s linear infinite }

/* ── stagger for list items ── */
.a-up:nth-child(1)  { animation-delay:.02s }
.a-up:nth-child(2)  { animation-delay:.05s }
.a-up:nth-child(3)  { animation-delay:.08s }
.a-up:nth-child(4)  { animation-delay:.11s }
.a-up:nth-child(5)  { animation-delay:.14s }
.a-up:nth-child(6)  { animation-delay:.17s }
.a-up:nth-child(7)  { animation-delay:.2s  }
.a-up:nth-child(n+8){ animation-delay:.22s }

/* ══ DARK MODE ═══════════════════════════════════════════════ */
[data-theme="dark"] {
  --bg:    #0C0E14;
  --card:  #161921;
  --navy:  #F8FAFC;
  --text:  #E8ECF0;
  --text2: #8B95A1;
  --text3: #555E6A;
  --border:rgba(255,255,255,.06);
  --sh:    0 1px 3px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
  --sh-lg: 0 8px 40px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
  --green-l:rgba(34,197,94,.14);
  --red-l:  rgba(239,68,68,.14);
  --amber-l:rgba(245,158,11,.14);
  --blue-l: rgba(99,102,241,.14);
}
[data-theme="dark"] input,
[data-theme="dark"] textarea { color:var(--text); }
[data-theme="dark"] .day-cell:hover { background:rgba(255,255,255,.05); }
[data-theme="dark"] .cal-day:hover  { background:rgba(255,255,255,.04); }
[data-theme="dark"] .chip-gray { background:rgba(255,255,255,.08); color:var(--text2); }
[data-theme="dark"] .chip-gs  { background:rgba(15,118,110,.25);  color:#2DD4BF; }
[data-theme="dark"] .chip-cv  { background:rgba(185,28,28,.22);   color:#FCA5A5; }

/* ══ LAYOUT ══════════════════════════════════════════════════ */
.app-shell {
  position:fixed; inset:0;
  display:flex; overflow:hidden;
  background:var(--bg);
}
.sidebar {
  width:248px; flex-shrink:0; height:100%;
  background:var(--card);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
  padding:28px 14px 0;
}
.sidebar-nav { flex:1; overflow-y:auto; min-height:0; padding-bottom:8px; }
.sidebar-bottom { flex-shrink:0; padding:10px 0 20px; }

.main-col {
  flex:1; display:flex; flex-direction:column;
  overflow:hidden; min-width:0;
}
/* THE scroll fix: main-scroll is the overflow container — NO padding.
   Padding lives on the inner .view-pad div so iOS Safari counts it in scrollHeight */
.main-scroll {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
}
.view-pad {
  padding:20px 28px 48px;   /* desktop bottom breathing room */
}

.detail-col {
  width:340px; flex-shrink:0; height:100%;
  border-left:1px solid var(--border);
  background:var(--card);
  display:flex; flex-direction:column;
  overflow-y:auto;
}
/* ══ MOBILE DRAWER ═══════════════════════════════════════════ */
.mob-drawer-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.38); z-index:300;
  backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px);
}
.mob-drawer {
  display:none; position:fixed;
  top:0; left:0; bottom:0; width:min(280px, 82vw);
  background:var(--card);
  z-index:301; overflow-y:auto;
  padding:calc(env(safe-area-inset-top) + 28px) 14px 32px;
  box-shadow:4px 0 32px rgba(0,0,0,.18);
  transform:translateX(-100%);
  transition:transform .3s cubic-bezier(0.16,1,0.3,1);
}
.mob-drawer.open { transform:translateX(0); }
.mob-drawer-overlay.open { display:block; }
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
.mob-drawer-overlay.open { animation:overlayIn .22s ease both; }
.bottom-sheet-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.45); z-index:200;
}
.bottom-sheet {
  display:none; position:fixed;
  bottom:0; left:0; right:0;
  background:var(--card);
  border-radius:24px 24px 0 0;
  max-height:88vh; z-index:210;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
  padding-bottom:env(safe-area-inset-bottom);
}

/* ── Responsive ── */
@media (max-width:768px) {
  .sidebar     { display:none !important; }
  .detail-col  { display:none !important; }
  .mob-drawer  { display:block; }
  .bottom-sheet-overlay { display:block; }
  .bottom-sheet         { display:block; }
  /* No bottom nav — just safe area + generous buffer */
  .view-pad { padding:16px 18px calc(env(safe-area-inset-bottom) + 40px) 18px; }
  .fab { display:flex !important; }
  .desktop-add { display:none !important; }
  .greeting { font-size:24px; letter-spacing:-.4px; }
  .main-hdr { padding:calc(env(safe-area-inset-top) + 16px) 18px 0; }
  .mob-menu-btn { display:flex !important; }
}
@media (min-width:769px) {
  .bottom-sheet-overlay { display:none; }
  .bottom-sheet { display:none; }
  .fab { display:none !important; }
}
@media (min-width:769px) and (max-width:1100px) {
  .sidebar { width:210px; }
  .detail-col { width:300px; }
  .view-pad { padding:20px 22px 48px; }
}

/* ══ TASK ITEM ═══════════════════════════════════════════════ */
.task-item {
  display:flex; align-items:flex-start; gap:14px;
  padding:17px 20px;
  background:var(--card);
  border-radius:18px;
  box-shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 18px rgba(0,0,0,.05);
  margin-bottom:10px;
  cursor:pointer;
  transition:box-shadow .22s, transform .18s, opacity .35s, background .35s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(0,0,0,.038);
}
[data-theme="dark"] .task-item { border-color:rgba(255,255,255,.05); }
.task-item::before {
  content:'';
  position:absolute; inset:0;
  opacity:0;
  transition:opacity .15s;
  background:rgba(0,0,0,.018);
  pointer-events:none;
}
.task-item:hover { box-shadow:0 2px 20px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05); transform:translateY(-1px); }
.task-item:hover::before { opacity:1; }
.task-item:active { transform:scale(.984); box-shadow:0 1px 2px rgba(0,0,0,.04); }
.task-item.selected {
  box-shadow:0 0 0 2px var(--blue), 0 8px 32px rgba(99,102,241,.13);
  transform:translateY(-1px);
  z-index:2; position:relative;
}
.task-item.completing {
  animation:completeFade .4s cubic-bezier(0.4,0,0.2,1) forwards;
}
.task-item.task-done {
  opacity:.42;
  background:var(--bg);
  box-shadow:none;
  border-color:transparent;
  transform:scale(.988);
}

/* ── Checkbox ── */
.cb-wrap {
  width:22px; height:22px; border-radius:50%; flex-shrink:0; margin-top:1px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .22s cubic-bezier(0.4,0,0.2,1);
}
.cb-wrap.checked { animation:checkBounce .38s cubic-bezier(0.175,.885,.32,1.275) both; }

/* ══ CHIPS ════════════════════════════════════════════════════ */
.chip {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 8px; border-radius:var(--r-pill);
  font-size:10.5px; font-weight:600; flex-shrink:0;
  letter-spacing:.1px;
}
.chip-green  { background:var(--green-l); color:var(--green); }
.chip-red    { background:var(--red-l);   color:var(--red); }
.chip-amber  { background:var(--amber-l); color:var(--amber); }
.chip-blue   { background:var(--blue-l);  color:var(--blue); }
.chip-gray   { background:#F3F4F6; color:var(--text2); }
.chip-gs     { background:#CCFBF1; color:#0F766E; }  /* Gradescope — dark aqua */
.chip-cw     { background:#EEF2FF; color:#4F46E5; }  /* Course web */
.chip-cv     { background:#FEE2E2; color:#B91C1C; }  /* Canvas — red */

/* ══ NAV BUTTONS ═════════════════════════════════════════════ */
.nav-btn {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px;
  border-radius:11px;
  font-size:13.5px; font-weight:500;
  color:var(--text2);
  cursor:pointer; width:100%;
  transition:background .15s, color .15s;
  margin-bottom:1px;
}
.nav-btn:hover  { background:var(--bg); color:var(--text); }
.nav-btn.active {
  background:var(--navy); color:#fff;
  font-weight:600;
}
[data-theme="dark"] .nav-btn.active { background:rgba(255,255,255,.1); color:var(--text); }

/* ══ SECTION HEADER ══════════════════════════════════════════ */
.section-hdr {
  font-size:11px; font-weight:700;
  text-transform:uppercase; letter-spacing:.8px;
  color:var(--text3);
  margin:18px 0 10px;
  padding:0 4px;
  display:flex; align-items:center; gap:8px;
}
.section-hdr:first-child { margin-top:0; }
.section-hdr.overdue { color:var(--red); }
.section-hdr.today   { color:var(--amber); }

/* ══ BUTTONS ═════════════════════════════════════════════════ */
.btn-green {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:15px 24px; border-radius:var(--r-pill);
  background:var(--green); color:#fff;
  font-size:15px; font-weight:700; width:100%;
  cursor:pointer; transition:filter .15s, transform .1s;
}
.btn-green:hover  { filter:brightness(1.06); }
.btn-green:active { filter:brightness(.95); transform:scale(.99); }
.btn-navy {
  display:flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 20px; border-radius:var(--r-pill);
  background:var(--navy); color:#fff;
  font-size:14px; font-weight:600; cursor:pointer;
  transition:filter .15s;
}

/* ══ FAB ══════════════════════════════════════════════════════ */
.fab {
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom) + 22px);
  right:20px;
  width:54px; height:54px; border-radius:50%;
  background:var(--navy); color:#fff;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 4px 24px rgba(0,0,0,.22);
  cursor:pointer; z-index:99;
  transition:transform .15s, box-shadow .15s;
}
.fab:active { transform:scale(.9); }

/* ══ PROGRESS ════════════════════════════════════════════════ */
.progress-bar {
  height:5px; background:rgba(0,0,0,.07);
  border-radius:5px; overflow:hidden;
}
[data-theme="dark"] .progress-bar { background:rgba(255,255,255,.08); }
.progress-fill {
  height:100%; border-radius:5px;
  background:linear-gradient(90deg,var(--green),#4ADE80);
  transition:width .5s cubic-bezier(0.4,0,0.2,1);
}

/* ══ WEEK STRIP ═══════════════════════════════════════════════ */
.week-strip {
  display:flex; align-items:center;
  overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
  gap:2px; padding:0 2px;
}
.week-strip::-webkit-scrollbar { display:none; }
.day-cell {
  display:flex; flex-direction:column; align-items:center;
  gap:4px; padding:8px 9px;
  border-radius:12px; cursor:pointer; flex-shrink:0;
  transition:background .15s;
  min-width:44px;
}
.day-cell:hover { background:rgba(0,0,0,.04); }
.day-cell.today { background:var(--navy); }
.day-cell.today .day-name,
.day-cell.today .day-num { color:#fff; }
.day-cell.filtered { background:var(--blue); }
.day-cell.filtered .day-name,
.day-cell.filtered .day-num { color:#fff; }
.day-name { font-size:10px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.3px; }
.day-num  { font-size:17px; font-weight:800; color:var(--text2); }
.day-dot  { width:5px; height:5px; border-radius:50%; background:var(--green); }
.day-dot.red { background:var(--red); }

/* ══ FIELD ════════════════════════════════════════════════════ */
.field {
  background:var(--bg); border-radius:12px;
  padding:10px 14px; border:1.5px solid var(--border);
  transition:border-color .15s;
}
.field:focus-within { border-color:var(--blue); }
.field-label {
  font-size:10px; font-weight:700; color:var(--text3);
  text-transform:uppercase; letter-spacing:.6px; margin-bottom:3px;
}

/* ══ TOGGLE ═══════════════════════════════════════════════════ */
.toggle { width:38px; height:23px; border-radius:12px; position:relative; cursor:pointer; transition:background .2s; flex-shrink:0; }
.toggle-knob { position:absolute; top:3.5px; width:16px; height:16px; border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,.2); transition:left .2s cubic-bezier(0.4,0,0.2,1); }

/* ══ MODAL ════════════════════════════════════════════════════ */
.modal-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.45);
  display:flex; align-items:center; justify-content:center;
  z-index:400; backdrop-filter:blur(6px);
  padding:20px; animation:fadeIn .18s ease both;
}
.modal-box {
  background:var(--card); border-radius:24px;
  box-shadow:var(--sh-lg); width:100%; max-width:420px;
  padding:28px 24px; animation:popIn .28s cubic-bezier(.175,.885,.32,1.275) both;
}

/* ══ SMART INPUT ══════════════════════════════════════════════ */
.smart-input-wrap {
  display:flex; align-items:center; gap:12px;
  background:var(--card); border-radius:var(--r);
  padding:14px 16px; box-shadow:var(--sh);
  border:2px solid transparent;
  transition:border-color .18s, box-shadow .18s;
  margin-bottom:16px;
}
.smart-input-wrap.focused {
  border-color:var(--blue);
  box-shadow:0 0 0 4px rgba(99,102,241,.1), var(--sh);
}

/* ══ STICKY GLASS HEADER ══════════════════════════════════════ */
.main-hdr {
  position:sticky; top:0; z-index:10; flex-shrink:0;
  background:rgba(240,242,245,.78);
  backdrop-filter:saturate(180%) blur(18px);
  -webkit-backdrop-filter:saturate(180%) blur(18px);
  border-bottom:1px solid rgba(0,0,0,.045);
  padding:22px 22px 0;
  transition:box-shadow .2s;
}
[data-theme="dark"] .main-hdr {
  background:rgba(12,14,20,.80);
  border-bottom-color:rgba(255,255,255,.05);
}

/* ══ GREETING ═════════════════════════════════════════════════ */
.greeting {
  font-size:30px; font-weight:800;
  line-height:1.15; letter-spacing:-.7px; color:var(--navy);
}
.greeting-sub { font-size:13px; color:var(--text3); margin-top:3px; font-weight:500; letter-spacing:.1px; }

/* ══ MISC ═════════════════════════════════════════════════════ */
.divider { height:1px; background:var(--border); margin:12px 4px; }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:var(--border); margin:10px auto 20px; }
.integ-card { background:var(--card); border-radius:var(--r); box-shadow:var(--sh); padding:20px; margin-bottom:12px; }
.integ-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:800; flex-shrink:0; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-day { min-height:68px; padding:6px; background:var(--card); border-radius:10px; cursor:pointer; transition:background .15s; border:1.5px solid transparent; }
.cal-day:hover { background:var(--bg); }
.cal-day.today  { border-color:var(--navy); }
.cal-day.selected { background:var(--navy); }
.cal-day.other-month { opacity:.3; }
.cal-day-num { font-size:12px; font-weight:700; margin-bottom:4px; }
.cal-day.selected .cal-day-num { color:#fff; }
.cal-dot-row { display:flex; flex-wrap:wrap; gap:3px; }
.cal-dot { width:6px; height:6px; border-radius:50%; }
.card { background:var(--card); border-radius:var(--r); box-shadow:var(--sh); }

/* ══ LOADING ══════════════════════════════════════════════════ */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--text3); z-index:9999;
  font-family:'Inter',sans-serif;
}
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="root"></div>
<script>
window.onerror = function(msg,s,l) {
  var el = document.getElementById('loading');
  if (el) el.innerHTML = '<div style="color:#FF4455;font-size:13px;padding:20px;max-width:400px">Error: ' + msg + ' (line ' + l + ')</div>';
};
</script>
<script type="text/babel">
/* global React, ReactDOM */
var h = React.createElement;
var { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ─── DATE UTILS ────────────────────────────────────────── */
var DAYS3 = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MON3 = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function todayISO() { return new Date().toISOString().split('T')[0]; }

function offsetDate(n) {
  var d = new Date(); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

function parseISO(s) {
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}

function daysDiff(dateStr) {
  var d = parseISO(dateStr);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function friendlyDate(dateStr, timeStr) {
  if (!dateStr) return null;
  var diff = daysDiff(dateStr);
  var d = parseISO(dateStr);
  var label;
  if (diff < -1)  label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  else if (diff===-1) label = 'Yesterday';
  else if (diff===0)  label = 'Today';
  else if (diff===1)  label = 'Tomorrow';
  else if (diff<7)    label = DAYS_FULL[d.getDay()];
  else                label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (timeStr) {
    var p = timeStr.split(':');
    var h2 = +p[0]; var m = +p[1];
    var ap = h2>=12?'PM':'AM'; var hr = h2%12||12;
    label += ' · '+hr+':'+(m<10?'0':'')+m+' '+ap;
  }
  return label;
}

function priOf(dateStr) {
  if (!dateStr) return 'none';
  var diff = daysDiff(dateStr);
  if (diff<0)  return 'overdue';
  if (diff===0) return 'today';
  if (diff<=3) return 'soon';
  return 'later';
}

function sectionFor(dateStr) {
  if (!dateStr) return 'Someday';
  var diff = daysDiff(dateStr);
  if (diff<0)  return 'Overdue';
  if (diff===0) return 'Today';
  if (diff<=7) return 'This Week';
  return 'Later';
}

function uid() { return Math.random().toString(36).slice(2,10); }

function greeting() {
  var h3 = new Date().getHours();
  if (h3<12) return 'Good morning';
  if (h3<17) return 'Good afternoon';
  return 'Good evening';
}

/* ─── NLP PARSER ────────────────────────────────────────── */
function parseNLP(raw) {
  var text = raw.trim();
  var title = text;
  var dueDate = null;
  var dueTime = null;

  // Time
  var timeRx = /(?:at\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i;
  var tm = title.match(timeRx);
  if (tm) {
    var h2 = +tm[1]; var m = +(tm[2]||0); var ap = tm[3].toLowerCase();
    if (ap==='pm' && h2!==12) h2+=12;
    if (ap==='am' && h2===12) h2=0;
    dueTime = (h2<10?'0':'')+h2+':'+(m<10?'0':'')+m;
    title = title.replace(tm[0],'').trim();
  }

  var now = new Date(); now.setHours(0,0,0,0);

  var nextM = title.match(/\bnext\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
  if (nextM) {
    var di = DAYS_FULL.findIndex(function(d){return d.toLowerCase()===nextM[1].toLowerCase();});
    var diff2 = ((di-now.getDay()+7)%7)||7;
    var t = new Date(now); t.setDate(now.getDate()+diff2);
    dueDate = t.toISOString().split('T')[0];
    title = title.replace(nextM[0],'').trim();
  } else if (/\btomorrow\b/i.test(title)) {
    var t2 = new Date(now); t2.setDate(now.getDate()+1);
    dueDate = t2.toISOString().split('T')[0];
    title = title.replace(/\btomorrow\b/gi,'').trim();
  } else if (/\btoday\b/i.test(title)) {
    dueDate = now.toISOString().split('T')[0];
    title = title.replace(/\btoday\b/gi,'').trim();
  } else {
    var dayM = title.match(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
    if (dayM) {
      var di2 = DAYS_FULL.findIndex(function(d){return d.toLowerCase()===dayM[1].toLowerCase();});
      var diff3 = ((di2-now.getDay()+7)%7)||7;
      var t3 = new Date(now); t3.setDate(now.getDate()+diff3);
      dueDate = t3.toISOString().split('T')[0];
      title = title.replace(dayM[0],'').trim();
    }
  }

  if (!dueDate) {
    var slashM = title.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/);
    if (slashM) {
      var yr = +slashM[3]; if (yr<100) yr+=2000;
      var dt = new Date(yr,+slashM[1]-1,+slashM[2]);
      dueDate = dt.toISOString().split('T')[0];
      title = title.replace(slashM[0],'').trim();
    }
  }
  if (!dueDate) {
    var moRx = new RegExp('\\b('+MON3.join('|')+')[a-z]*\\s+(\\d{1,2})\\b','i');
    var moM = title.match(moRx);
    if (moM) {
      var moIdx = MON3.findIndex(function(m2){return m2===moM[1].toLowerCase().slice(0,3);});
      var yr2 = now.getFullYear();
      var dt2 = new Date(yr2,moIdx,+moM[2]);
      if (dt2<now) dt2.setFullYear(yr2+1);
      dueDate = dt2.toISOString().split('T')[0];
      title = title.replace(moM[0],'').trim();
    }
  }
  if (!dueDate) {
    var inM = title.match(/\bin\s+(\d+)\s+(days?|weeks?)\b/i);
    if (inM) {
      var n2 = +inM[1]; var isWk = /week/i.test(inM[2]);
      var t4 = new Date(now); t4.setDate(now.getDate()+(isWk?n2*7:n2));
      dueDate = t4.toISOString().split('T')[0];
      title = title.replace(inM[0],'').trim();
    }
  }

  title = title.replace(/\s+/g,' ').replace(/[,;:.]+$/,'').trim()||raw.trim();
  return { title:title, dueDate:dueDate, dueTime:dueTime };
}

/* ─── NOTIFICATIONS ─────────────────────────────────────── */
function askNotif() {
  if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}
function scheduleNotif(task) {
  if (!task.reminder||!task.dueDate) return;
  if (!('Notification' in window)||Notification.permission!=='granted') return;
  var p = (task.dueTime||'23:59').split(':');
  var due = parseISO(task.dueDate); due.setHours(+p[0],+p[1],0,0);
  var delay = due.getTime()-(task.reminderOffset||60)*60000-Date.now();
  if (delay>0&&delay<7*86400000) {
    setTimeout(function() {
      new Notification('TaskFlow',{body:task.title+' — '+friendlyDate(task.dueDate,task.dueTime)});
    }, delay);
  }
}

/* ─── REAL ICS INTEGRATION HELPERS ───────────────────────── */
/* Fetches a public iCal (.ics) feed through our Vercel serverless
 * proxy at /api/fetch-ics (needed to bypass browser CORS), then
 * converts each VEVENT into a TaskFlow task object. */
async function fetchIcsEvents(icsUrl) {
  var res = await fetch('/api/fetch-ics?url=' + encodeURIComponent(icsUrl));
  if (!res.ok) {
    var err = {};
    try { err = await res.json(); } catch(e){}
    throw new Error(err.error || ('HTTP ' + res.status));
  }
  var data = await res.json();
  return data.events || [];
}

/* Try to extract a course code tag from a summary (e.g. "CS 341 Homework 3" → "CS 341"). */
function extractTag(summary) {
  if (!summary) return null;
  var m = summary.match(/\b([A-Z]{2,5})[\s-]?(\d{2,4}[A-Z]?)\b/);
  if (m) return (m[1] + ' ' + m[2]).toUpperCase();
  return null;
}

function normalizeKey(s) {
  return String(s||'').toLowerCase().replace(/\s+/g,' ').trim();
}

function eventsToTasks(events, source, defaultTag) {
  var todayI = todayISO();
  // Horizon: include past 14d + future 180d so stale feeds don't flood
  var back = new Date(Date.now() - 14*86400000).toISOString().slice(0,10);
  var fwd  = new Date(Date.now() + 180*86400000).toISOString().slice(0,10);
  return events
    .filter(function(e){ return e.date && e.date >= back && e.date <= fwd; })
    .map(function(e){
      var tag = extractTag(e.summary) || defaultTag || null;
      return {
        title: e.summary,
        desc:  e.description || e.location || '',
        dueDate: e.date,
        dueTime: e.time || null,
        source: source,
        tags: tag ? [tag] : [],
        recurring: !!e.rrule,
        recurringType: guessRecurring(e.rrule),
        externalId: e.uid || (source+':'+e.summary+':'+e.date),
      };
    });
}

function anyIntegrationConnected(i) {
  if (!i) return false;
  if (i.gradescope) return true;
  if (i.canvas) return true;
  if (i.courseWebs && i.courseWebs.length) return true;
  return false;
}

function guessRecurring(rrule) {
  if (!rrule) return null;
  var s = rrule.toUpperCase();
  if (s.indexOf('FREQ=WEEKLY')  >= 0) return 'weekly';
  if (s.indexOf('FREQ=DAILY')   >= 0) return 'daily';
  if (s.indexOf('FREQ=MONTHLY') >= 0) return 'monthly';
  if (s.indexOf('FREQ=YEARLY')  >= 0) return 'yearly';
  return null;
}

/* ─── WEEK STRIP ─────────────────────────────────────────── */
function WeekStrip({ tasks, onDayFilter, filtered }) {
  var today = new Date(); today.setHours(0,0,0,0);
  var startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());

  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i);
    var iso = d.toISOString().split('T')[0];
    var hasTasks = tasks.some(function(t){return !t.completed && t.dueDate===iso;});
    var hasOverdue = tasks.some(function(t){return !t.completed && t.dueDate && t.dueDate<iso && d<=today;});
    var isToday = (d.getTime()===today.getTime());
    days.push({d:d, iso:iso, hasTasks:hasTasks, hasOverdue:hasOverdue, isToday:isToday});
  }

  return (
    <div className="week-strip">
      {days.map(function(day) {
        var isFiltered = filtered===day.iso;
        return (
          <div
            key={day.iso}
            className={'day-cell'+(day.isToday?' today':'')+(isFiltered&&!day.isToday?' selected':'')}
            style={isFiltered&&!day.isToday?{background:'var(--blue-l)',color:'var(--blue)'}:{}}
            onClick={function(){onDayFilter(isFiltered?null:day.iso);}}
          >
            <span className="day-name" style={isFiltered&&!day.isToday?{color:'var(--blue)'}:{}}>
              {DAYS3[day.d.getDay()]}
            </span>
            <span className="day-num" style={isFiltered&&!day.isToday?{color:'var(--blue)'}:{}}>
              {day.d.getDate()}
            </span>
            {day.hasTasks && (
              <div className={'day-dot'+(day.d<today?' red':'')} />
            )}
          </div>
        );
      })}
    </div>
  );
}

function TaskSection({ title, tasks, selectedId, onToggle, onSelect }) {

/* ─── SMART INPUT ────────────────────────────────────────── */
function SmartInput({ onAdd }) {
  var [val,setVal] = useState('');
  var [focused,setFocused] = useState(false);

  function submit() {
    var v = val.trim(); if (!v) return;
    onAdd(v); setVal('');
  }
  function handleKey(e) { if (e.key==='Enter'){e.preventDefault();submit();} }

  return (
    <div style={{marginBottom:20}}>
      <div className={'smart-input-wrap'+(focused?' focused':'')} style={{
        background:'var(--card)',borderRadius:'var(--r)',
      }}>
        <span style={{color:focused?'var(--blue)':'var(--text3)',display:'flex',flexShrink:0}}>{ICO.plus}</span>
        <input
          value={val}
          onChange={function(e){setVal(e.target.value);}}
          onKeyDown={handleKey}
          onFocus={function(){setFocused(true);}}
          onBlur={function(){setFocused(false);}}
          placeholder='Add a task… "CS hw tuesday at 11pm"'
          style={{fontSize:14,flex:1}}
        />
        {val && (
          <button
            onClick={submit}
            style={{
              flexShrink:0,background:'var(--navy)',color:'#fff',
              width:30,height:30,borderRadius:9,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}
          >
            {ICO.chevR}
          </button>
        )}
      </div>
      {focused&&!val && (
        <p className="a-fade" style={{fontSize:11,color:'var(--text3)',marginTop:6,paddingLeft:2}}>
          Supports natural language — dates, days, and times are auto-detected
        </p>
      )}
    </div>
  );
}

function IntegrationsPage({ integrations, onUpdate, onSync, syncStatus }) {
  // Canvas state
  var [cvOpen,setCvOpen] = useState(false);
  var [cvInst,setCvInst] = useState(
    (integrations.canvas&&integrations.canvas.institution) || 'https://canvas.uw.edu'
  );
  var [cvUrl,setCvUrl] = useState('');

  // Gradescope iCal fallback state (for schools that do offer it)
  var [gsOpen,setGsOpen] = useState(false);
  var [gsUrl,setGsUrl]   = useState('');

  // Course website state
  var [cwOpen,setCwOpen] = useState(false);
  var [cwName,setCwName] = useState('');
  var [cwUrl,setCwUrl]   = useState('');

  var cvConn = !!integrations.canvas;
  var gsConn = !!integrations.gradescope;
  var courseWebs = integrations.courseWebs || [];

  function save(kind, data) { onUpdate(kind, data); }

  function connectCanvas() {
    if (!cvUrl.trim()) return;
    save('canvas', {
      institution: (cvInst||'').trim().replace(/\/+$/,''),
      icsUrl: cvUrl.trim(),
      connectedAt: new Date().toISOString(),
    });
    setCvOpen(false); setCvUrl('');
    onSync();
  }
  function connectGradescope() {
    if (!gsUrl.trim()) return;
    save('gradescope', { icsUrl: gsUrl.trim(), connectedAt: new Date().toISOString() });
    setGsOpen(false); setGsUrl('');
    onSync();
  }
  function addCourseWeb() {
    if (!cwUrl.trim()) return;
    var next = courseWebs.concat([{
      id: uid(),
      name: (cwName||'New Course').trim(),
      icsUrl: cwUrl.trim(),
      connectedAt: new Date().toISOString(),
    }]);
    save('courseWebs', next);
    setCwOpen(false); setCwName(''); setCwUrl('');
    onSync();
  }
  function removeCourseWeb(id) {
    save('courseWebs', courseWebs.filter(function(c){return c.id!==id;}));
  }

  var anyConn = cvConn || gsConn || courseWebs.length > 0;

  return (

            {(syncStatus&&syncStatus.running)?'Syncing…':'Sync Now'}

      </div>

          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:15,fontWeight:700}}>Canvas</span>
              <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,background:'#E6F8EF',color:'#0F7B3A'}}>RECOMMENDED</span>
            </div>

/* ─── CALENDAR VIEW ──────────────────────────────────────── */
var CAL_DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var CAL_MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function CalendarView({ tasks, onSelectDay }) {
  var today = new Date();
  var [yr,  setYr]  = useState(today.getFullYear());
  var [mon, setMon] = useState(today.getMonth()); // 0-indexed
  var [sel, setSel] = useState(null);

  /* Build calendar grid */
  var firstDay  = new Date(yr, mon, 1).getDay(); // 0=Sun
  var daysInMon = new Date(yr, mon + 1, 0).getDate();
  var daysInPrev= new Date(yr, mon, 0).getDate();
  var todayISO2 = today.toISOString().slice(0,10);

  /* Map tasks to date keys */
  var tasksByDate = {};
  tasks.forEach(function(t){
    if (!t.dueDate) return;
    if (!tasksByDate[t.dueDate]) tasksByDate[t.dueDate] = [];
    tasksByDate[t.dueDate].push(t);
  });

  function isoOf(y,m,d){
    return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }

  function selectDay(iso){
    var next = sel===iso ? null : iso;
    setSel(next);
    onSelectDay(next);
  }

  function prevMon(){ if(mon===0){setMon(11);setYr(function(y){return y-1;});}else setMon(function(m){return m-1;}); }
  function nextMon(){ if(mon===11){setMon(0);setYr(function(y){return y+1;});}else setMon(function(m){return m+1;}); }

  /* Cells: leading grey + current + trailing grey */
  var cells = [];
  for (var i=0; i<firstDay; i++) {
    cells.push({iso: isoOf(yr, mon-1, daysInPrev-firstDay+1+i), day: daysInPrev-firstDay+1+i, other:true});
  }
  for (var d=1; d<=daysInMon; d++) {
    cells.push({iso: isoOf(yr, mon, d), day: d, other:false});
  }
  var trailing = 42 - cells.length;
  for (var j=1; j<=trailing; j++) {
    cells.push({iso: isoOf(yr, mon+1, j), day: j, other:true});
  }

  var srcClr = {gradescope:'#E8222F', canvas:'#E13F29', courseweb:'#2563EB', manual:'#5A67D8'};

  return (
    <div className="a-fade">
      {/* Month header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <button onClick={prevMon} style={{width:36,height:36,borderRadius:12,background:'var(--card)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>‹</button>
        <div style={{textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:800,color:'var(--navy)'}}>{CAL_MONTHS[mon]}</div>
          <div style={{fontSize:13,color:'var(--text3)'}}>{yr}</div>
        </div>
        <button onClick={nextMon} style={{width:36,height:36,borderRadius:12,background:'var(--card)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>›</button>
      </div>

      {/* Day-of-week headers */}
      <div className="cal-grid" style={{marginBottom:6}}>
        {CAL_DAYS.map(function(d){
          return <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--text3)',padding:'4px 0'}}>{d}</div>;
        })}
      </div>

      {/* Day cells */}
      <div className="cal-grid">
        {cells.map(function(cell){
          var ts = tasksByDate[cell.iso] || [];
          var isToday   = cell.iso === todayISO2;
          var isSelected= cell.iso === sel;
          var hasDue    = ts.filter(function(t){return !t.completed;}).length > 0;
          var hasOver   = ts.some(function(t){return !t.completed && t.dueDate < todayISO2;});
          return (
            <div
              key={cell.iso}
              className={'cal-day'+(isToday?' today':'')+(isSelected?' selected':'')+(cell.other?' other-month':'')}
              onClick={function(){selectDay(cell.iso);}}
            >
              <div className="cal-day-num" style={{
                color: isSelected?'#fff' : isToday?'var(--navy)' : hasOver?'var(--red)' : 'var(--text)',
              }}>{cell.day}</div>
              {ts.length>0 && (
                <div className="cal-dot-row">
                  {ts.slice(0,6).map(function(t,i){
                    var clr = t.completed?'#D1D5DB':(srcClr[t.source]||'var(--blue)');
                    return <div key={i} className="cal-dot" style={{background:isSelected?'rgba(255,255,255,.6)':clr}} />;
                  })}
                  {ts.length>6 && <div style={{fontSize:9,color:isSelected?'rgba(255,255,255,.7)':'var(--text3)',lineHeight:'7px'}}>+{ts.length-6}</div>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Legend */}
      <div style={{display:'flex',gap:16,marginTop:16,flexWrap:'wrap'}}>
        {[
          {label:'Gradescope', clr:'#E8222F'},
          {label:'Canvas',     clr:'#E13F29'},
          {label:'Course site',clr:'#2563EB'},
          {label:'Manual',     clr:'#5A67D8'},
          {label:'Completed',  clr:'#D1D5DB'},
        ].map(function(x){
          return (
            <div key={x.label} style={{display:'flex',alignItems:'center',gap:5}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:x.clr}} />
              <span style={{fontSize:11,color:'var(--text3)'}}>{x.label}</span>
            </div>
          );
        })}
      </div>

      {sel && (
        <div style={{marginTop:20}}>
          <div style={{fontSize:13,fontWeight:700,color:'var(--text2)',marginBottom:10}}>
            {new Date(sel+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
          </div>
          {(tasksByDate[sel]||[]).length===0 ? (
            <div style={{color:'var(--text3)',fontSize:13}}>No tasks due this day.</div>
          ) : (tasksByDate[sel]||[]).map(function(t){
            return (
              <div key={t.id} style={{
                display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                background:'var(--card)',borderRadius:12,marginBottom:8,
              }}>
                <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:srcClr[t.source]||'var(--blue)'}} />
                <span style={{flex:1,fontSize:13,fontWeight:600,color:t.completed?'var(--text3)':'var(--text)',textDecoration:t.completed?'line-through':'none'}}>{t.title}</span>
                {t.dueTime && <span style={{fontSize:11,color:'var(--text3)'}}>{t.dueTime}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── AUTH SCREEN ────────────────────────────────────────── */
function AuthModal({ onAuth, configured }) {
  var [err,setErr]   = useState('');
  var [busy,setBusy] = useState(false);
  /* Detect system dark preference so auth screen matches app default */
  var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

  function friendlyErr(e) {
    return e.code === 'auth/popup-closed-by-user'    ? '' :
           e.code === 'auth/cancelled-popup-request' ? '' :
           e.message || 'Something went wrong. Try again.';
  }

  async function signInWithGoogle() {
    setBusy(true); setErr('');
    try {
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      var result = await window.__FB_AUTH.signInWithPopup(provider);
      onAuth(result.user);
    } catch(e) { var msg = friendlyErr(e); if (msg) setErr(msg); }
    setBusy(false);
  }

  async function signInWithApple() {
    setBusy(true); setErr('');
    try {
      var provider = new firebase.auth.OAuthProvider('apple.com');
      provider.addScope('email'); provider.addScope('name');
      var result = await window.__FB_AUTH.signInWithPopup(provider);
      onAuth(result.user);
    } catch(e) { var msg = friendlyErr(e); if (msg) setErr(msg); }
    setBusy(false);
  }

  var bg      = sysDark ? '#0C0E14' : '#EAEAEB';
  var textPri = sysDark ? '#E8ECF0' : '#0D1117';
  var textSub = sysDark ? 'rgba(255,255,255,.36)' : 'rgba(13,17,23,.40)';

  var screenStyle = {
    position:'fixed', inset:0,
    background:bg,
    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
    fontFamily:"'Inter',-apple-system,sans-serif",
    overflow:'hidden',
  };

  if (!configured) {
    return (
      <div style={screenStyle}>
        <div style={{textAlign:'center',maxWidth:340,width:'calc(100% - 48px)',padding:'0 4px'}}>
          <div style={{fontSize:40,marginBottom:14}}>⚙️</div>
          <h2 style={{fontSize:20,fontWeight:800,color:textPri,marginBottom:10,letterSpacing:'-.3px'}}>Setup Required</h2>
          <p style={{fontSize:13,color:textSub,lineHeight:1.8,marginBottom:24}}>
            Add <strong style={{color:textPri}}>FIREBASE_API_KEY</strong>, <strong style={{color:textPri}}>FIREBASE_AUTH_DOMAIN</strong>, <strong style={{color:textPri}}>FIREBASE_PROJECT_ID</strong>, and <strong style={{color:textPri}}>FIREBASE_APP_ID</strong> to your Vercel env vars, then redeploy.
          </p>
          <a href="https://console.firebase.google.com" target="_blank" rel="noopener noreferrer"
            style={{display:'inline-block',padding:'13px 28px',borderRadius:100,background:'#0D1117',color:'#fff',fontSize:14,fontWeight:700,textDecoration:'none'}}>
            Open Firebase Console →
          </a>
        </div>
      </div>
    );
  }

  return (
    <div style={screenStyle}>
      <div style={{
        width:'calc(100% - 40px)', maxWidth:360,
        textAlign:'center',
        display:'flex', flexDirection:'column', alignItems:'center',
      }}>

        {/* App icon — matches sidebar */}
        <div style={{
          width:88,height:88,borderRadius:22,flexShrink:0,
          background:'#0D1117',
          display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',
          marginBottom:22,
          boxShadow:'0 4px 24px rgba(0,0,0,.18)',
        }}>
          <svg width="36" height="36" viewBox="0 0 16 16" fill="none">
            <path d="M2.5 5h11M2.5 8h11M2.5 11h7" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"/>
          </svg>
        </div>

        {/* Name */}
        <div style={{fontSize:42,fontWeight:800,color:textPri,letterSpacing:'-.8px',marginBottom:8,lineHeight:1}}>
          TaskFlow
        </div>
        <p style={{fontSize:15,color:textSub,marginBottom:48,fontWeight:400}}>
          Your assignment tracker
        </p>

        {/* Google */}
        <button
          onClick={signInWithGoogle} disabled={busy}
          style={{
            width:'100%', display:'flex', alignItems:'center', justifyContent:'center', gap:10,
            padding:'15px 20px', borderRadius:100, marginBottom:10,
            background:'#fff',
            border:'1px solid rgba(0,0,0,.08)',
            fontSize:15, fontWeight:600, color:'#0D1117',
            boxShadow:'0 1px 4px rgba(0,0,0,.08)',
            opacity:busy?0.6:1, cursor:busy?'default':'pointer',
            transition:'opacity .15s, transform .1s',
          }}
          onMouseEnter={function(e){e.currentTarget.style.transform='translateY(-1px)';}}
          onMouseLeave={function(e){e.currentTarget.style.transform='translateY(0)';}}

            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>

            transition:'opacity .15s, transform .1s',
          }}
          onMouseEnter={function(e){e.currentTarget.style.transform='translateY(-1px)';}}
          onMouseLeave={function(e){e.currentTarget.style.transform='translateY(0)';}}

/* ─── MAIN APP ───────────────────────────────────────────── */
function App() {
  /* ── Firebase auth state ── */
  var [fbConfig,setFbConfig]   = useState(null);
  var [session,setSession]     = useState(undefined);
  var [userId,setUserId]       = useState(null);
  var [displayName,setDisplayName] = useState('');
  var [darkMode,setDarkMode]   = useState(function(){return localStorage.getItem('tf-dark')==='1';});

  /* ── Task & integration state ── */
  var [tasks,setTasks] = useState(function(){
    try{ var s=localStorage.getItem('tf3-tasks'); return s?JSON.parse(s):SAMPLE; }catch(e){return SAMPLE;}
  });
  var [integrations,setIntegrations] = useState(function(){
    try{
      var s=localStorage.getItem('tf3-integ');
      var v = s?JSON.parse(s):{};
      if (!v.courseWebs) v.courseWebs = [];
      return v;
    }catch(e){return {courseWebs:[]};}
  });
  var [syncStatus,setSyncStatus] = useState({ running:false, message:'', error:false });
  var [view,setView]           = useState('today');
  var [selectedId,setSelectedId] = useState(null);
  var [nlp,setNlp]             = useState(null);
  var [search,setSearch]       = useState('');
  var [searchOpen,setSearchOpen] = useState(false);
  var [dayFilter,setDayFilter] = useState(null);
  var [drawerOpen,setDrawerOpen] = useState(false);

  /* ── Boot: fetch Firebase config, init SDK, listen for auth ── */
  useEffect(function(){
    fetch('/api/config').then(function(r){return r.json();}).then(function(cfg){
      setFbConfig(cfg);
      if (cfg.configured && window.firebase) {
        // Avoid double-init on hot reload
        var app = firebase.apps.length
          ? firebase.apps[0]
          : firebase.initializeApp({
              apiKey:     cfg.apiKey,
              authDomain: cfg.authDomain,
              projectId:  cfg.projectId,
              appId:      cfg.appId,
            });
        var auth = app.auth();
        var db   = app.firestore();
        window.__FB_AUTH = auth;
        window.__FB_DB   = db;
        // onAuthStateChanged fires immediately with current user (or null)
        auth.onAuthStateChanged(function(user){
          setSession(user || null);
          if (user) { setUserId(user.uid); loadUserData(db, user.uid, user); }
          else      { setUserId(null); }
        });
      } else {
        setSession(null); // Firebase not configured — local/guest mode
      }
    }).catch(function(){ setFbConfig({configured:false}); setSession(null); });
  }, []);

  /* ── Dark mode: apply to document ── */
  useEffect(function(){
    document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
    try { localStorage.setItem('tf-dark', darkMode ? '1' : '0'); } catch(e){}
    // Persist to Firestore if logged in
    if (window.__FB_DB && userId) {
      window.__FB_DB.collection('users').doc(userId).collection('profile').doc('main')
        .set({ darkMode: darkMode }, { merge: true }).catch(function(){});
    }
  }, [darkMode, userId]);

  /* ── Load user data from Firestore ── */
  async function loadUserData(db, uid, authUser) {
    try {
      var userRef  = db.collection('users').doc(uid);
      var [tasksSnap, integSnap, profileSnap] = await Promise.all([
        userRef.collection('tasks').get(),
        userRef.collection('integrations').doc('main').get(),
        userRef.collection('profile').doc('main').get(),
      ]);
      if (!tasksSnap.empty) {
        setTasks(tasksSnap.docs.map(function(d){ return d.data(); }));
      }
      if (integSnap.exists) {
        var v = integSnap.data();
        if (!v.courseWebs) v.courseWebs = [];
        setIntegrations(v);
      }
      if (profileSnap.exists && profileSnap.data().displayName) {
        var p = profileSnap.data();
        setDisplayName(p.displayName);
        if (typeof p.darkMode === 'boolean') setDarkMode(p.darkMode);
      } else {
        /* Use first name from Google/Apple account as default */
        var authName = authUser && (authUser.displayName || '');
        if (authName) setDisplayName(authName.split(' ')[0]);
      }
    } catch(e) { console.warn('loadUserData failed', e); }
  }

  /* ── Save display name to Firestore ── */
  async function saveDisplayName(name) {
    setDisplayName(name);
    if (window.__FB_DB && userId) {
      await window.__FB_DB.collection('users').doc(userId).collection('profile').doc('main')
        .set({ displayName: name }, { merge: true });
    }
  }

  /* ── Persist tasks → localStorage + Firestore ── */
  useEffect(function(){
    try{localStorage.setItem('tf3-tasks',JSON.stringify(tasks));}catch(e){}
    if (!window.__FB_DB || !userId) return;
    var db  = window.__FB_DB;
    var col = db.collection('users').doc(userId).collection('tasks');
    var batch = db.batch();
    tasks.forEach(function(t){ batch.set(col.doc(t.id), t); });
    batch.commit().catch(function(e){ console.warn('tasks sync failed', e); });
  }, [tasks, userId]);

  /* ── Persist integrations → localStorage + Firestore ── */
  useEffect(function(){
    try{localStorage.setItem('tf3-integ',JSON.stringify(integrations));}catch(e){}
    if (!window.__FB_DB || !userId) return;
    window.__FB_DB.collection('users').doc(userId).collection('integrations')
      .doc('main').set(integrations)
      .catch(function(e){ console.warn('integrations sync failed', e); });
  }, [integrations, userId]);

  useEffect(function(){askNotif();},[]);
  useEffect(function(){
    var iv = setInterval(function(){
      if(anyIntegrationConnected(integrations)) doSync();
    },6*3600000);
    return function(){clearInterval(iv);};
  },[integrations]);

  var selectedTask = useMemo(function(){
    return tasks.find(function(t){return t.id===selectedId;})||null;
  },[tasks,selectedId]);

  var sections = useMemo(function(){
    var list = tasks;
    if (search) {
      var q = search.toLowerCase();
      list = list.filter(function(t){
        return t.title.toLowerCase().includes(q)||(t.desc&&t.desc.toLowerCase().includes(q))||(t.tags&&t.tags.some(function(tg){return tg.toLowerCase().includes(q);}));
      });
    }
    if (dayFilter) {
      list = list.filter(function(t){return t.dueDate===dayFilter;});
    } else {
      if (view==='today')    list=list.filter(function(t){return !t.completed&&t.dueDate&&t.dueDate<=todayISO();});
      if (view==='upcoming') list=list.filter(function(t){return !t.completed&&(!t.dueDate||t.dueDate>todayISO());});
      if (view==='completed') list=list.filter(function(t){return t.completed;});
    }

    if (view==='completed'||dayFilter) return [{title:dayFilter?('Tasks for '+friendlyDate(dayFilter,null)):'Completed',tasks:list}];

    var buckets = {Overdue:[],Today:[],  'This Week':[],Later:[],Someday:[]};
    list.forEach(function(t){var s=sectionFor(t.dueDate);if(buckets[s])buckets[s].push(t);});
    var ORDER=['Overdue','Today','This Week','Later','Someday'];
    return ORDER.reduce(function(acc,k){
      if(buckets[k]&&buckets[k].length){
        buckets[k].sort(function(a,b){return(a.dueDate||'z')>(b.dueDate||'z')?1:-1;});
        acc.push({title:k,tasks:buckets[k]});
      }
      return acc;
    },[]);
  },[tasks,view,search,dayFilter]);

  function handleAdd(raw) { setNlp({input:raw,parsed:parseNLP(raw)}); }

  function confirmAdd(data) {
    var task = {
      id:uid(),title:data.title,desc:'',dueDate:data.dueDate,dueTime:data.dueTime,
      reminder:data.reminder,reminderOffset:data.reminderOffset||60,
      recurring:false,recurringType:null,completed:false,source:'manual',tags:[],
    };
    setTasks(function(p){return [task].concat(p);});
    scheduleNotif(task);
    setNlp(null);
  }

  function updateTask(updated) {
    setTasks(function(p){return p.map(function(t){return t.id===updated.id?updated:t;});});
  }
  function deleteTask(id) {
    setTasks(function(p){return p.filter(function(t){return t.id!==id;});});
    if(selectedId===id) setSelectedId(null);
  }
  function toggleTask(id,val) {
    setTasks(function(p){return p.map(function(t){return t.id===id?{...t,completed:val}:t;});});
  }
  function selectTask(id) {
    setSelectedId(function(p){return p===id?null:id;});
  }
  /* Update a single integration slot (gradescope / canvas / courseWebs). */
  function updateInteg(kind, value) {
    setIntegrations(function(p){
      var next = {...p};
      if (value === null || value === undefined) delete next[kind];
      else next[kind] = value;
      if (!next.courseWebs) next.courseWebs = [];
      return next;
    });
  }

  /* Merge newly fetched tasks into state with dedup.
   * Dedup key = normalizedTitle + '|' + dueDate. Manual tasks are never overwritten. */
  function mergeImported(incoming) {
    if (!incoming || !incoming.length) return;
    setTasks(function(prev){
      var index = {};
      prev.forEach(function(t){
        var k = normalizeKey(t.title) + '|' + (t.dueDate||'');
        index[k] = t;
      });
      var additions = [];
      incoming.forEach(function(t){
        var k = normalizeKey(t.title) + '|' + (t.dueDate||'');
        if (index[k]) return; // duplicate — skip
        index[k] = t;
        additions.push({
          id:uid(),
          title:t.title, desc:t.desc||'',
          dueDate:t.dueDate, dueTime:t.dueTime||null,
          reminder:true, reminderOffset:60,
          recurring:!!t.recurring, recurringType:t.recurringType||null,
          completed:false, source:t.source,
          tags:t.tags||[], externalId:t.externalId||null,
        });
      });
      return prev.concat(additions);
    });
  }

  async function doSync() {
    if (!anyIntegrationConnected(integrations)) return;
    setSyncStatus({ running:true, message:'', error:false });

    var imported = [];
    var errors   = [];

    // All sources — live iCal fetch
    var icsSources = [];
    if (integrations.gradescope && integrations.gradescope.icsUrl) {
      icsSources.push({ kind:'gradescope', url:integrations.gradescope.icsUrl, tag:null });
    }
    if (integrations.canvas && integrations.canvas.icsUrl) {
      icsSources.push({ kind:'canvas', url:integrations.canvas.icsUrl, tag:null });
    }
    (integrations.courseWebs||[]).forEach(function(cw){
      if (cw.icsUrl) icsSources.push({ kind:'courseweb', url:cw.icsUrl, tag:cw.name });
    });

    await Promise.all(icsSources.map(async function(s){
      try {
        var events = await fetchIcsEvents(s.url);
        imported = imported.concat(eventsToTasks(events, s.kind, s.tag));
      } catch(e) {
        errors.push((s.tag||s.kind) + ': ' + e.message);
      }
    }));

    // Dedup within incoming batch (same title + date from multiple feeds)
    var seen = {};
    var deduped = [];
    imported.forEach(function(t){
      var k = normalizeKey(t.title)+'|'+(t.dueDate||'');
      if (seen[k]) return;
      seen[k] = true;
      deduped.push(t);
    });

    mergeImported(deduped);

    var now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    var totalSrc = icsSources.length;
    var msg = errors.length
      ? 'Synced with errors: ' + errors.join(' · ')
      : 'Last sync ' + now + ' · ' + deduped.length + ' event' + (deduped.length===1?'':'s') + ' from ' + totalSrc + ' source' + (totalSrc===1?'':'s');
    setSyncStatus({ running:false, message:msg, error:errors.length>0 });
  }

  var overdueCt = tasks.filter(function(t){return !t.completed&&t.dueDate&&t.dueDate<todayISO();}).length;
  var todayCt   = tasks.filter(function(t){return !t.completed&&t.dueDate===todayISO();}).length;
  var urgBadge  = overdueCt+todayCt;

  var TITLE = {today:'Today',upcoming:'Upcoming',all:'All Tasks',completed:'Completed',integrations:'Integrations'};
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  var isDesktop = typeof window !== 'undefined' && window.innerWidth > 768;

  function handleSetView(v) { setView(v); setSelectedId(null); setDayFilter(null); }

  async function handleLogout() {
    if (window.__FB_AUTH) await window.__FB_AUTH.signOut();
    setSession(null); setUserId(null);
  }
  function handleAuth(user) {
    setSession(user);
    if (user) { setUserId(user.uid); loadUserData(window.__FB_DB, user.uid, user); }
  }

  /* Show loading spinner while Firebase resolves auth state */
  if (session === undefined || fbConfig === null) {
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--text3)',fontSize:14}}>Loading…</div>;
  }

  /* Show auth modal when logged out — always, whether Firebase is configured or not */
  if (session === null) {
    return <AuthModal onAuth={handleAuth} configured={!!(fbConfig && fbConfig.configured)} />;
  }

  var userEmail   = session && session.email;
  var userName    = displayName || (userEmail ? userEmail.split('@')[0] : 'there');

  return (
    <div className="app-shell">
      {/* Sidebar — desktop only */}
      <Sidebar
        view={view} setView={handleSetView} tasks={tasks} integrations={integrations}
        displayName={displayName} userEmail={userEmail}
      />

      {/* Main column */}
      <div className="main-col">
        {/* Top header */}
        <div className="main-hdr">
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
              {/* Hamburger — mobile only */}
              <button
                className="mob-menu-btn"
                onClick={function(){setDrawerOpen(true);}}
                style={{
                  display:'none',
                  width:36,height:36,borderRadius:10,
                  background:'var(--card)',
                  alignItems:'center',justifyContent:'center',
                  flexShrink:0,marginTop:3,
                  boxShadow:'var(--sh)',
                  color:'var(--text)',
                }}
              >
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                  <rect width="16" height="2" rx="1" fill="currentColor"/>
                  <rect y="5" width="12" height="2" rx="1" fill="currentColor"/>
                  <rect y="10" width="8" height="2" rx="1" fill="currentColor"/>
                </svg>
              </button>
              <div>
                <div className="greeting">
                  {view==='integrations'?'Integrations':view==='calendar'?'Calendar':view==='completed'?'Completed':view==='settings'?'Settings':greeting()+', '+userName}
                </div>
                {view!=='integrations'&&view!=='calendar'&&view!=='completed'&&view!=='settings' && (
                  <p className="greeting-sub">{dateStr}</p>
                )}
              </div>
            </div>
            <div style={{display:'flex',gap:6,marginTop:4}}>
              {view!=='integrations'&&view!=='settings' && (
                <button
                  onClick={function(){setSearchOpen(function(o){return !o;});setSearch('');}}
                  style={{
                    padding:'8px 10px',borderRadius:12,
                    background:searchOpen?'var(--navy)':'var(--card)',
                    color:searchOpen?'#fff':'var(--text2)',
                    boxShadow:searchOpen?'none':SHADOW||'var(--sh)',
                    display:'flex',alignItems:'center',transition:'all .14s',
                  }}
                >
                  {ICO.search}
                </button>
              )}
            </div>
          </div>

          {/* Search bar */}
          {searchOpen && view!=='integrations' && (
            <div className="a-fade" style={{
              display:'flex',alignItems:'center',gap:10,
              background:'var(--card)',borderRadius:14,
              padding:'10px 14px',marginBottom:12,boxShadow:'var(--sh)',
              border:'2px solid var(--navy)',
            }}>
              <span style={{color:'var(--text3)',display:'flex'}}>{ICO.search}</span>
              <input
                autoFocus value={search}
                onChange={function(e){setSearch(e.target.value);}}
                placeholder="Search tasks…"
                style={{fontSize:14,flex:1}}
              />
              {search&&<button onClick={function(){setSearch('');}} style={{color:'var(--text3)',display:'flex'}}>{ICO.close}</button>}
            </div>
          )}

          {/* Week strip — task views only */}
          {view!=='integrations'&&view!=='completed'&&view!=='calendar'&&view!=='settings' && (
            <div style={{marginBottom:14}}>
              <WeekStrip tasks={tasks} onDayFilter={setDayFilter} filtered={dayFilter} />
            </div>
          )}
          {(view==='integrations'||view==='completed'||view==='calendar'||view==='settings') && (
            <div style={{height:14}} />
          )}
        </div>

        {/* Scrollable content */}
        <div className="main-scroll">
          <div className="view-pad">
          <div key={view} className="a-view" style={{display:'flex',flexDirection:'column',gap:8}}>
          {view!=='integrations'&&view!=='calendar'&&view!=='settings' && (
            <SmartInput onAdd={handleAdd} />
          )}

          {view==='settings' ? (
            <SettingsPage
              user={session}
              displayName={displayName}
              onSaveName={saveDisplayName}
              darkMode={darkMode}
              onToggleDark={function(){setDarkMode(function(d){return !d;});}}
              onLogout={handleLogout}
            />
          ) : view==='calendar' ? (
            <CalendarView tasks={tasks} onSelectDay={function(iso){setDayFilter(iso); if(iso) setView('all'); }} />
          ) : view==='integrations' ? (
            <IntegrationsPage
              integrations={integrations}
              onUpdate={updateInteg}
              onSync={doSync}
              syncStatus={syncStatus}
            />
          ) : sections.length===0 ? (
            <div style={{
              display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',paddingTop:60,gap:14,color:'var(--text3)',
            }}>
              <div style={{
                width:64,height:64,borderRadius:20,background:'var(--card)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:28,boxShadow:'var(--sh)',
              }}>
                ✓
              </div>
              <p style={{fontSize:15,fontWeight:600,color:'var(--text2)'}}>
                {view==='completed'?'No completed tasks yet':'All clear — add a task above'}
              </p>
            </div>
          ) : (
            sections.map(function(sec){
              return (
                <TaskSection
                  key={sec.title}
                  title={sec.title}
                  tasks={sec.tasks}
                  selectedId={selectedId}
                  onToggle={toggleTask}
                  onSelect={selectTask}
                />
              );
            })
          )}
          </div>
          </div>
        </div>
      </div>

      {/* Detail panel — desktop only */}
      {selectedTask && (
        <DetailPanel
          key={selectedTask.id}
          task={selectedTask}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onClose={function(){setSelectedId(null);}}
        />
      )}

      {/* Detail sheet — mobile only */}
      {selectedTask && (
        <DetailSheet
          key={'sheet-'+selectedTask.id}
          task={selectedTask}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onClose={function(){setSelectedId(null);}}
        />
      )}

      {/* FAB — mobile only */}
      <div
        className="fab"
        onClick={function(){setNlp({input:'',parsed:{title:'',dueDate:null,dueTime:null}});}}
      >
        {ICO.plus}
      </div>

      {/* Mobile slide-in drawer */}
      <MobileDrawer
        open={drawerOpen}
        onClose={function(){setDrawerOpen(false);}}
        view={view}
        setView={handleSetView}
        tasks={tasks}
        displayName={displayName}
        userEmail={userEmail}
        urgBadge={urgBadge}
      />

      {/* NLP modal */}
      {nlp && (
        <AddModal
          input={nlp.input}
          parsed={nlp.parsed}
          onConfirm={confirmAdd}
          onCancel={function(){setNlp(null);}}
        />
      )}
    </div>
  );
}

/* ─── MOUNT ──────────────────────────────────────────────── */
var SHADOW = '0 2px 12px rgba(0,0,0,.06)';
document.getElementById('loading').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
