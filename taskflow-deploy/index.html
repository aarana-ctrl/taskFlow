<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ECEEF1">
<title>TaskFlow</title>
<script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.23.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #ECEEF1;
  --card: #FFFFFF;
  --navy: #0D1117;
  --text: #1A1D23;
  --text2: #6B7280;
  --text3: #9CA3AF;
  --green: #28C76F;
  --green-l: #E6F9EE;
  --red: #FF4455;
  --red-l: #FFF0F2;
  --amber: #F59E0B;
  --amber-l: #FFF8E6;
  --blue: #5A67D8;
  --blue-l: #EEF0FD;
  --border: rgba(0,0,0,.06);
  --r: 18px;
  --r-sm: 10px;
  --r-pill: 40px;
  --sh: 0 2px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --sh-lg: 0 8px 30px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.06);
  --nav-h: 72px;
}
html { height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}
#root { height: 100%; }
input,textarea,select,button { font-family: inherit; }
input,textarea { border: none; outline: none; background: transparent; color: inherit; }
input::placeholder,textarea::placeholder { color: var(--text3); }
button { cursor: pointer; border: none; background: none; color: inherit; }
::-webkit-scrollbar { width: 0px; }
a { color: inherit; text-decoration: none; }

/* ── Animations ── */
@keyframes fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes slideUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes sheetUp   { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes slideRight{ from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
@keyframes spin      { 0%{transform:rotate(0)} 100%{transform:rotate(360deg)} }
@keyframes popIn     { 0%{transform:scale(.95);opacity:0} 100%{transform:scale(1);opacity:1} }

.a-fade  { animation: fadeIn .25s ease both }
.a-up    { animation: slideUp .35s cubic-bezier(0.16,1,0.3,1) both }
.a-sheet { animation: sheetUp .35s cubic-bezier(.32,1,.28,1) both }
.a-right { animation: slideRight .3s ease both }
.a-pop   { animation: popIn .3s cubic-bezier(.175,.885,.32,1.275) both }
.spinning{ animation: spin .9s linear infinite }

/* ── Layout ── */
.app-shell {
  display: flex;
  height: 100%;
  overflow: hidden;
  position: relative;
}
.sidebar {
  width: 240px;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100%;
  overflow-y: auto;
  padding: 24px 12px;
}
.main-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.main-scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.view-content {
  padding: 24px 32px;
}
.detail-col {
  width: 340px;
  border-left: 1px solid var(--border);
  background: var(--card);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  height: 100%;
  overflow-y: auto;
}
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  height: var(--nav-h);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.bottom-sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 200;
}
.bottom-sheet {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-radius: 24px 24px 0 0;
  max-height: 88vh;
  z-index: 210;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: env(safe-area-inset-bottom);
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar  { display: none !important; }
  .detail-col { display: none !important; }
  .bottom-nav { display: flex; }
  .bottom-sheet-overlay { display: block; }
  .bottom-sheet { display: block; }
  .view-content { padding: 24px 20px calc(var(--nav-h) + 120px) 20px !important; }
  .fab { display: flex !important; }
  .desktop-add { display: none !important; }
}
@media (min-width: 769px) {
  .bottom-nav { display: none; }
  .bottom-sheet-overlay { display: none; }
  .bottom-sheet { display: none; }
  .fab { display: none !important; }
}
@media (min-width: 769px) and (max-width: 1100px) {
  .sidebar { width: 200px; }
  .detail-col { width: 300px; }
}

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: var(--r);
  box-shadow: var(--sh);
}

/* ── Task item ── */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 20px;
  background: var(--card);
  border-radius: 20px;
  box-shadow: var(--sh);
  margin-bottom: 12px;
  cursor: pointer;
  transition: all .35s cubic-bezier(0.4, 0, 0.2, 1);
  -webkit-tap-highlight-color: transparent;
}
.task-item.completed {
  opacity: 0.55;
  background: var(--bg);
  transform: scale(0.99);
  box-shadow: none;
}
.task-item:active { transform: scale(.98); }
.task-item.selected { box-shadow: 0 0 0 2px var(--blue), var(--sh-lg); transform: translateY(-2px); z-index: 10; position: relative; }

/* ── Chip ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  font-size: 11px;
  font-weight: 600;
  flex-shrink: 0;
}
.chip-green  { background: var(--green-l);  color: var(--green); }
.chip-red    { background: var(--red-l);    color: var(--red); }
.chip-amber  { background: var(--amber-l);  color: var(--amber); }
.chip-blue   { background: var(--blue-l);   color: var(--blue); }
.chip-gray   { background: #F3F4F6; color: var(--text2); }
.chip-gs     { background: #FEECED; color: #E8222F; }
.chip-cw     { background: #EBF3FE; color: #2563EB; }

/* ── Nav item ── */
.nav-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  width: 100%;
  transition: all .12s;
  margin-bottom: 2px;
}
.nav-btn:hover  { background: var(--bg); color: var(--text); }
.nav-btn.active { background: var(--navy); color: #fff; }

/* ── Section header ── */
.section-hdr {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text3);
  margin-bottom: 10px;
  padding: 0 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-hdr.overdue { color: var(--red); }
.section-hdr.today   { color: var(--amber); }

/* ── Green button ── */
.btn-green {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 24px;
  border-radius: var(--r-pill);
  background: var(--green);
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  width: 100%;
  cursor: pointer;
  transition: filter .15s;
}
.btn-green:hover { filter: brightness(1.05); }
.btn-green:active { filter: brightness(.96); transform: scale(.99); }
.btn-navy {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 20px;
  border-radius: var(--r-pill);
  background: var(--navy);
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: filter .15s;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  right: 20px;
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--green);
  color: #fff;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(40,199,111,.4);
  cursor: pointer;
  z-index: 99;
  transition: transform .15s;
}
.fab:active { transform: scale(.93); }

/* ── Progress bar ── */
.progress-bar {
  height: 6px;
  background: #E5E7EB;
  border-radius: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 6px;
  background: var(--green);
  transition: width .4s ease;
}

/* ── Week strip ── */
.week-strip {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding: 0 2px;
}
.week-strip::-webkit-scrollbar { display: none; }
.day-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 10px;
  border-radius: 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .12s;
  min-width: 44px;
}
.day-cell:hover { background: var(--bg); }
.day-cell.today { background: var(--navy); }
.day-cell.today .day-name,
.day-cell.today .day-num { color: #fff; }
.day-name { font-size: 11px; font-weight: 500; color: var(--text3); }
.day-num  { font-size: 16px; font-weight: 700; color: var(--text2); }
.day-dot  {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--green);
}
.day-dot.red { background: var(--red); }

/* ── Field ── */
.field {
  background: var(--bg);
  border-radius: 12px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
}
.field-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .6px;
  margin-bottom: 3px;
}

/* ── Toggle ── */
.toggle {
  width: 36px; height: 22px;
  border-radius: 11px;
  position: relative;
  cursor: pointer;
  transition: background .15s;
  flex-shrink: 0;
}
.toggle-knob {
  position: absolute;
  top: 3px;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  transition: left .15s;
}

/* ── Avatar ── */
.avatar {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}

/* ── Modal overlay ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 400;
  backdrop-filter: blur(2px);
  padding: 20px;
}
.modal-box {
  background: var(--card);
  border-radius: 24px;
  box-shadow: var(--sh-lg);
  width: 100%;
  max-width: 420px;
  padding: 28px 24px;
}

/* ── Smart input ── */
.smart-input-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--card);
  border-radius: var(--r);
  padding: 14px 16px;
  box-shadow: var(--sh);
  border: 2px solid transparent;
  transition: border-color .18s, box-shadow .18s;
}
.smart-input-wrap.focused {
  border-color: var(--blue);
  box-shadow: 0 0 0 4px rgba(90,103,216,.1), var(--sh);
}

/* ── Greeting ── */
.greeting {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: -0.5px;
  color: var(--navy);
}
.greeting-sub {
  font-size: 13px;
  color: var(--text3);
  margin-top: 2px;
}

/* ── Divider ── */
.divider { height: 1px; background: var(--bg); margin: 14px 0; }

/* ── Overlay sheet handle ── */
.sheet-handle {
  width: 36px; height: 4px;
  border-radius: 2px;
  background: var(--border);
  margin: 10px auto 20px;
}

/* ── Integration card ── */
.integ-card {
  background: var(--card);
  border-radius: var(--r);
  box-shadow: var(--sh);
  padding: 20px;
  margin-bottom: 12px;
}
.integ-icon {
  width: 44px; height: 44px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800;
  flex-shrink: 0;
}

/* ── Loading ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--text3); z-index: 9999;
  font-family: 'Inter', sans-serif;
}
</style>
</head>

<div id="root"></div>
<script>

  var el = document.getElementById('loading');
  if (el) el.innerHTML = '<div style="color:#FF4455;font-size:13px;padding:20px;max-width:400px">Error: ' + msg + ' (line ' + l + ')</div>';

</script>
<script type="text/babel">
/* global React, ReactDOM */
var h = React.createElement;
var { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ─── DATE UTILS ────────────────────────────────────────── */
var DAYS3 = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var MON3 = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
var MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function todayISO() { return new Date().toISOString().split('T')[0]; }

function offsetDate(n) {
  var d = new Date(); d.setDate(d.getDate()+n);
  return d.toISOString().split('T')[0];
}

function parseISO(s) {
  var p = s.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}

function daysDiff(dateStr) {
  var d = parseISO(dateStr);
  var now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function friendlyDate(dateStr, timeStr) {
  if (!dateStr) return null;
  var diff = daysDiff(dateStr);
  var d = parseISO(dateStr);
  var label;
  if (diff < -1)  label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  else if (diff===-1) label = 'Yesterday';
  else if (diff===0)  label = 'Today';
  else if (diff===1)  label = 'Tomorrow';
  else if (diff<7)    label = DAYS_FULL[d.getDay()];
  else                label = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (timeStr) {
    var p = timeStr.split(':');
    var h2 = +p[0]; var m = +p[1];
    var ap = h2>=12?'PM':'AM'; var hr = h2%12||12;
    label += ' · '+hr+':'+(m<10?'0':'')+m+' '+ap;
  }
  return label;
}

function priOf(dateStr) {
  if (!dateStr) return 'none';
  var diff = daysDiff(dateStr);
  if (diff<0)  return 'overdue';
  if (diff===0) return 'today';
  if (diff<=3) return 'soon';
  return 'later';
}

function sectionFor(dateStr) {
  if (!dateStr) return 'Someday';
  var diff = daysDiff(dateStr);
  if (diff<0)  return 'Overdue';
  if (diff===0) return 'Today';
  if (diff<=7) return 'This Week';
  return 'Later';
}

function uid() { return Math.random().toString(36).slice(2,10); }

function greeting() {
  var h3 = new Date().getHours();
  if (h3<12) return 'Good morning';
  if (h3<17) return 'Good afternoon';
  return 'Good evening';
}

/* ─── NLP PARSER ────────────────────────────────────────── */
function parseNLP(raw) {
  var text = raw.trim();
  var title = text;
  var dueDate = null;
  var dueTime = null;

  // Time
  var timeRx = /(?:at\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm)\b/i;
  var tm = title.match(timeRx);
  if (tm) {
    var h2 = +tm[1]; var m = +(tm[2]||0); var ap = tm[3].toLowerCase();
    if (ap==='pm' && h2!==12) h2+=12;
    if (ap==='am' && h2===12) h2=0;
    dueTime = (h2<10?'0':'')+h2+':'+(m<10?'0':'')+m;
    title = title.replace(tm[0],'').trim();
  }

  var now = new Date(); now.setHours(0,0,0,0);

  var nextM = title.match(/\bnext\s+(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
  if (nextM) {
    var di = DAYS_FULL.findIndex(function(d){return d.toLowerCase()===nextM[1].toLowerCase();});
    var diff2 = ((di-now.getDay()+7)%7)||7;
    var t = new Date(now); t.setDate(now.getDate()+diff2);
    dueDate = t.toISOString().split('T')[0];
    title = title.replace(nextM[0],'').trim();
  } else if (/\btomorrow\b/i.test(title)) {
    var t2 = new Date(now); t2.setDate(now.getDate()+1);
    dueDate = t2.toISOString().split('T')[0];
    title = title.replace(/\btomorrow\b/gi,'').trim();
  } else if (/\btoday\b/i.test(title)) {
    dueDate = now.toISOString().split('T')[0];
    title = title.replace(/\btoday\b/gi,'').trim();
  } else {
    var dayM = title.match(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/i);
    if (dayM) {
      var di2 = DAYS_FULL.findIndex(function(d){return d.toLowerCase()===dayM[1].toLowerCase();});
      var diff3 = ((di2-now.getDay()+7)%7)||7;
      var t3 = new Date(now); t3.setDate(now.getDate()+diff3);
      dueDate = t3.toISOString().split('T')[0];
      title = title.replace(dayM[0],'').trim();
    }
  }

  if (!dueDate) {
    var slashM = title.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{2,4})\b/);
    if (slashM) {
      var yr = +slashM[3]; if (yr<100) yr+=2000;
      var dt = new Date(yr,+slashM[1]-1,+slashM[2]);
      dueDate = dt.toISOString().split('T')[0];
      title = title.replace(slashM[0],'').trim();
    }
  }
  if (!dueDate) {
    var moRx = new RegExp('\\b('+MON3.join('|')+')[a-z]*\\s+(\\d{1,2})\\b','i');
    var moM = title.match(moRx);
    if (moM) {
      var moIdx = MON3.findIndex(function(m2){return m2===moM[1].toLowerCase().slice(0,3);});
      var yr2 = now.getFullYear();
      var dt2 = new Date(yr2,moIdx,+moM[2]);
      if (dt2<now) dt2.setFullYear(yr2+1);
      dueDate = dt2.toISOString().split('T')[0];
      title = title.replace(moM[0],'').trim();
    }
  }
  if (!dueDate) {
    var inM = title.match(/\bin\s+(\d+)\s+(days?|weeks?)\b/i);
    if (inM) {
      var n2 = +inM[1]; var isWk = /week/i.test(inM[2]);
      var t4 = new Date(now); t4.setDate(now.getDate()+(isWk?n2*7:n2));
      dueDate = t4.toISOString().split('T')[0];
      title = title.replace(inM[0],'').trim();
    }
  }

  title = title.replace(/\s+/g,' ').replace(/[,;:.]+$/,'').trim()||raw.trim();
  return { title:title, dueDate:dueDate, dueTime:dueTime };
}

/* ─── NOTIFICATIONS ─────────────────────────────────────── */
function askNotif() {
  if ('Notification' in window && Notification.permission==='default') Notification.requestPermission();
}
function scheduleNotif(task) {
  if (!task.reminder||!task.dueDate) return;
  if (!('Notification' in window)||Notification.permission!=='granted') return;
  var p = (task.dueTime||'23:59').split(':');
  var due = parseISO(task.dueDate); due.setHours(+p[0],+p[1],0,0);
  var delay = due.getTime()-(task.reminderOffset||60)*60000-Date.now();
  if (delay>0&&delay<7*86400000) {
    setTimeout(function() {
      new Notification('TaskFlow',{body:task.title+' — '+friendlyDate(task.dueDate,task.dueTime)});
    }, delay);
  }
}

/* ─── SAMPLE DATA ────────────────────────────────────────── */
var SAMPLE = [
  {id:uid(),title:'CS 341 Homework 3',desc:'Dynamic programming — ch. 7–9',dueDate:todayISO(),dueTime:'23:59',reminder:true,reminderOffset:60,recurring:false,recurringType:null,completed:false,source:'gradescope',tags:['CS 341']},

/* ─── WEEK STRIP ─────────────────────────────────────────── */
function WeekStrip({ tasks, onDayFilter, filtered }) {
  var today = new Date(); today.setHours(0,0,0,0);
  var startOfWeek = new Date(today);
  startOfWeek.setDate(today.getDate() - today.getDay());

  var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(startOfWeek); d.setDate(startOfWeek.getDate()+i);
    var iso = d.toISOString().split('T')[0];
    var hasTasks = tasks.some(function(t){return !t.completed && t.dueDate===iso;});
    var hasOverdue = tasks.some(function(t){return !t.completed && t.dueDate && t.dueDate<iso && d<=today;});
    var isToday = (d.getTime()===today.getTime());
    days.push({d:d, iso:iso, hasTasks:hasTasks, hasOverdue:hasOverdue, isToday:isToday});
  }

  return (
    <div className="week-strip">
      {days.map(function(day) {
        var isFiltered = filtered===day.iso;
        return (
          <div
            key={day.iso}
            className={'day-cell'+(day.isToday?' today':'')+(isFiltered&&!day.isToday?' selected':'')}
            style={isFiltered&&!day.isToday?{background:'var(--blue-l)',color:'var(--blue)'}:{}}
            onClick={function(){onDayFilter(isFiltered?null:day.iso);}}
          >
            <span className="day-name" style={isFiltered&&!day.isToday?{color:'var(--blue)'}:{}}>
              {DAYS3[day.d.getDay()]}
            </span>
            <span className="day-num" style={isFiltered&&!day.isToday?{color:'var(--blue)'}:{}}>
              {day.d.getDate()}
            </span>
            {day.hasTasks && (
              <div className={'day-dot'+(day.d<today?' red':'')} />
            )}
          </div>
        );
      })}
    </div>
  );
}

/* ─── SMART INPUT ────────────────────────────────────────── */
function SmartInput({ onAdd }) {
  var [val,setVal] = useState('');
  var [focused,setFocused] = useState(false);

  function submit() {
    var v = val.trim(); if (!v) return;
    onAdd(v); setVal('');
  }
  function handleKey(e) { if (e.key==='Enter'){e.preventDefault();submit();} }

  return (
    <div style={{marginBottom:20}}>
      <div className={'smart-input-wrap'+(focused?' focused':'')} style={{
        background:'var(--card)',borderRadius:'var(--r)',
      }}>
        <span style={{color:focused?'var(--blue)':'var(--text3)',display:'flex',flexShrink:0}}>{ICO.plus}</span>
        <input
          value={val}
          onChange={function(e){setVal(e.target.value);}}
          onKeyDown={handleKey}
          onFocus={function(){setFocused(true);}}
          onBlur={function(){setFocused(false);}}
          placeholder='Add a task… "CS hw tuesday at 11pm"'
          style={{fontSize:14,flex:1}}
        />
        {val && (
          <button
            onClick={submit}
            style={{
              flexShrink:0,background:'var(--navy)',color:'#fff',
              width:30,height:30,borderRadius:9,
              display:'flex',alignItems:'center',justifyContent:'center',
            }}
          >

          </button>
        )}
      </div>
      {focused&&!val && (
        <p className="a-fade" style={{fontSize:11,color:'var(--text3)',marginTop:6,paddingLeft:2}}>
          Supports natural language — dates, days, and times are auto-detected
        </p>
      )}
    </div>
  );
}

  useEffect(function(){

    setRecType(task.recurringType||'weekly');dirty.current=false;
  },[task.id]);

  useEffect(function(){
    if (!dirty.current) return;
    var t = setTimeout(function(){
      onUpdate({...task,title:title,desc:desc,dueDate:dueDate||null,dueTime:dueTime||null,
        reminder:reminder,reminderOffset:offset,recurring:recur,recurringType:recur?recType:null});
    },500);
    return function(){clearTimeout(t);};
  },[title,desc,dueDate,dueTime,reminder,offset,recur,recType]);

  function m(fn){ return function(v){fn(v);dirty.current=true;}; }

  var dotClr = {gradescope:'#E8222F',courseweb:'#2563EB',manual:'var(--blue)'}[task.source]||'var(--blue)';
  var srcLabel = {gradescope:'Gradescope',courseweb:'Course Website',manual:'Added manually'}[task.source]||'Manual';

          onClick={function(){onDelete(task.id);}}
          style={{color:'var(--text3)',display:'flex',padding:'5px 7px',borderRadius:8,transition:'color .12s'}}
          onMouseEnter={function(e){e.currentTarget.style.color='var(--red)';}}

          {ICO.close}
        </button>
      </div>

      <div style={{flex:1,overflowY:'auto',padding:'20px 20px',paddingBottom:30}}>
        <textarea
          value={title}
          onChange={function(e){setTitle(e.target.value);dirty.current=true;}}
          rows={2}
          style={{fontSize:17,fontWeight:700,lineHeight:1.4,width:'100%',resize:'none',marginBottom:10,color:'var(--navy)'}}
        />
        <textarea
          value={desc}
          onChange={function(e){setDesc(e.target.value);dirty.current=true;}}

          rows={3}
          style={{
            fontSize:13,lineHeight:1.65,width:'100%',resize:'none',
            color:'var(--text2)',borderBottom:'1px solid var(--bg)',
            paddingBottom:14,marginBottom:16,

function DetailSheet({ task, onUpdate, onDelete, onClose }) {
  var [title,setTitle]       = useState(task.title);
  var [desc,setDesc]         = useState(task.desc||'');
  var [dueDate,setDueDate]   = useState(task.dueDate||'');
  var [dueTime,setDueTime]   = useState(task.dueTime||'');
  var [reminder,setReminder] = useState(task.reminder||false);
  var [offset,setOffset]     = useState(task.reminderOffset||60);
  var [recur,setRecur]       = useState(task.recurring||false);
  var [recType,setRecType]   = useState(task.recurringType||'weekly');
  var dirty = useRef(false);

  useEffect(function(){
    setTitle(task.title);setDesc(task.desc||'');setDueDate(task.dueDate||'');
    setDueTime(task.dueTime||'');setReminder(task.reminder||false);
    setOffset(task.reminderOffset||60);setRecur(task.recurring||false);
    setRecType(task.recurringType||'weekly');dirty.current=false;
  },[task.id]);

  useEffect(function(){
    if (!dirty.current) return;
    var t = setTimeout(function(){
      onUpdate({...task,title:title,desc:desc,dueDate:dueDate||null,dueTime:dueTime||null,
        reminder:reminder,reminderOffset:offset,recurring:recur,recurringType:recur?recType:null});
    },500);
    return function(){clearTimeout(t);};
  },[title,desc,dueDate,dueTime,reminder,offset,recur,recType]);

  function m(fn){ return function(v){fn(v);dirty.current=true;}; }

/* ─── MAIN APP ───────────────────────────────────────────── */
function App() {
  var [tasks,setTasks] = useState(function(){
    try{ var s=localStorage.getItem('tf3-tasks'); return s?JSON.parse(s):SAMPLE; }catch(e){return SAMPLE;}
  });
  var [integrations,setIntegrations] = useState(function(){
    try{ var s=localStorage.getItem('tf3-integ'); return s?JSON.parse(s):{}; }catch(e){return {};}
  });
  var [view,setView]           = useState('today');
  var [selectedId,setSelectedId] = useState(null);
  var [nlp,setNlp]             = useState(null); // {input,parsed}
  var [search,setSearch]       = useState('');
  var [searchOpen,setSearchOpen] = useState(false);
  var [dayFilter,setDayFilter] = useState(null);

  useEffect(function(){try{localStorage.setItem('tf3-tasks',JSON.stringify(tasks));}catch(e){}}, [tasks]);
  useEffect(function(){try{localStorage.setItem('tf3-integ',JSON.stringify(integrations));}catch(e){}}, [integrations]);
  useEffect(function(){askNotif();},[]);
  useEffect(function(){
    var iv = setInterval(function(){
      if(integrations.gradescope||integrations.courseweb) doSync();
    },6*3600000);
    return function(){clearInterval(iv);};
  },[integrations]);

  var selectedTask = useMemo(function(){
    return tasks.find(function(t){return t.id===selectedId;})||null;
  },[tasks,selectedId]);

  var sections = useMemo(function(){
    var list = tasks;
    if (search) {
      var q = search.toLowerCase();
      list = list.filter(function(t){
        return t.title.toLowerCase().includes(q)||(t.desc&&t.desc.toLowerCase().includes(q))||(t.tags&&t.tags.some(function(tg){return tg.toLowerCase().includes(q);}));
      });
    }
    if (dayFilter) {
      list = list.filter(function(t){return t.dueDate===dayFilter;});
    } else {
      if (view==='today')    list=list.filter(function(t){return !t.completed&&t.dueDate&&t.dueDate<=todayISO();});
      if (view==='upcoming') list=list.filter(function(t){return !t.completed&&(!t.dueDate||t.dueDate>todayISO());});
      if (view==='completed') list=list.filter(function(t){return t.completed;});
    }

    if (view==='completed'||dayFilter) return [{title:dayFilter?('Tasks for '+friendlyDate(dayFilter,null)):'Completed',tasks:list}];

    var buckets = {Overdue:[],Today:[],  'This Week':[],Later:[],Someday:[]};
    list.forEach(function(t){var s=sectionFor(t.dueDate);if(buckets[s])buckets[s].push(t);});
    var ORDER=['Overdue','Today','This Week','Later','Someday'];
    return ORDER.reduce(function(acc,k){
      if(buckets[k]&&buckets[k].length){
        buckets[k].sort(function(a,b){return(a.dueDate||'z')>(b.dueDate||'z')?1:-1;});
        acc.push({title:k,tasks:buckets[k]});
      }
      return acc;
    },[]);
  },[tasks,view,search,dayFilter]);

  function handleAdd(raw) { setNlp({input:raw,parsed:parseNLP(raw)}); }

  function confirmAdd(data) {
    var task = {
      id:uid(),title:data.title,desc:'',dueDate:data.dueDate,dueTime:data.dueTime,
      reminder:data.reminder,reminderOffset:data.reminderOffset||60,
      recurring:false,recurringType:null,completed:false,source:'manual',tags:[],
    };
    setTasks(function(p){return [task].concat(p);});
    scheduleNotif(task);
    setNlp(null);
  }

  function updateTask(updated) {
    setTasks(function(p){return p.map(function(t){return t.id===updated.id?updated:t;});});
  }
  function deleteTask(id) {
    setTasks(function(p){return p.filter(function(t){return t.id!==id;});});
    if(selectedId===id) setSelectedId(null);
  }
  function toggleTask(id,val) {
    setTasks(function(p){return p.map(function(t){return t.id===id?{...t,completed:val}:t;});});
  }
  function selectTask(id) {
    setSelectedId(function(p){return p===id?null:id;});
  }
  function connectInteg(type,info) {
    setIntegrations(function(p){return {...p,[type]:info};});
  }
  function importTasks(source) {
    var incoming = mockImport(source);
    setTasks(function(p){
      var ex = new Set(p.map(function(t){return t.title.toLowerCase();}));
      var newT = incoming
        .filter(function(t){return !ex.has(t.title.toLowerCase());})
        .map(function(t){return {id:uid(),title:t.title,desc:t.desc||'',dueDate:t.dueDate,dueTime:t.dueTime||null,
          reminder:true,reminderOffset:60,recurring:t.recurring||false,recurringType:t.recurringType||null,
          completed:false,source:t.source,tags:t.tags||[]};});
      return p.concat(newT);
    });
  }
  function doSync() {
    if(integrations.gradescope) importTasks('gradescope');
    if(integrations.courseweb)  importTasks('courseweb');
  }

  var overdueCt = tasks.filter(function(t){return !t.completed&&t.dueDate&&t.dueDate<todayISO();}).length;
  var todayCt   = tasks.filter(function(t){return !t.completed&&t.dueDate===todayISO();}).length;
  var urgBadge  = overdueCt+todayCt;

  var TITLE = {today:'Today',upcoming:'Upcoming',all:'All Tasks',completed:'Completed',integrations:'Integrations'};
  var now = new Date();
  var dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  var isDesktop = typeof window !== 'undefined' && window.innerWidth > 768;

  function handleSetView(v) { setView(v); setSelectedId(null); setDayFilter(null); }

  return (
    <div className="app-shell">
      {/* Sidebar — desktop only */}
      <Sidebar view={view} setView={handleSetView} tasks={tasks} integrations={integrations} />

      {/* Main column */}
      <div className="main-col">
        {/* Top header */}
        <div style={{
          padding:'20px 24px 0',flexShrink:0,
          background:'var(--bg)',
        }}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
            <div>
              <div className="greeting">
                {view==='integrations'?'Integrations':view==='completed'?'Completed':greeting()+', Rana'}
              </div>
              {view!=='integrations'&&view!=='completed' && (
                <p className="greeting-sub">{dateStr}</p>
              )}
            </div>
            <div style={{display:'flex',gap:6,marginTop:4}}>
              {view!=='integrations' && (
                <button
                  onClick={function(){setSearchOpen(function(o){return !o;});setSearch('');}}
                  style={{
                    padding:'8px 10px',borderRadius:12,
                    background:searchOpen?'var(--navy)':'var(--card)',
                    color:searchOpen?'#fff':'var(--text2)',
                    boxShadow:searchOpen?'none':SHADOW||'var(--sh)',
                    display:'flex',alignItems:'center',transition:'all .14s',
                  }}
                >
                  {ICO.search}
                </button>
              )}
            </div>
          </div>

          {/* Search bar */}
          {searchOpen && view!=='integrations' && (
            <div className="a-fade" style={{
              display:'flex',alignItems:'center',gap:10,
              background:'var(--card)',borderRadius:14,
              padding:'10px 14px',marginBottom:12,boxShadow:'var(--sh)',
              border:'2px solid var(--navy)',
            }}>
              <span style={{color:'var(--text3)',display:'flex'}}>{ICO.search}</span>
              <input
                autoFocus value={search}
                onChange={function(e){setSearch(e.target.value);}}
                placeholder="Search tasks…"
                style={{fontSize:14,flex:1}}
              />
              {search&&<button onClick={function(){setSearch('');}} style={{color:'var(--text3)',display:'flex'}}>{ICO.close}</button>}
            </div>
          )}

          {/* Week strip — task views only */}
          {view!=='integrations'&&view!=='completed' && (
            <div style={{marginBottom:16}}>
              <WeekStrip tasks={tasks} onDayFilter={setDayFilter} filtered={dayFilter} />
            </div>
          )}
        </div>

        {/* Scrollable content */}
        <div className="main-scroll view-content">
          <div key={view} className="a-fade" style={{display:'flex',flexDirection:'column',gap:8,minHeight:'100%'}}>
            {view!=='integrations' && (
              <SmartInput onAdd={handleAdd} />
            )}

          {view==='integrations' ? (
            <IntegrationsPage
              integrations={integrations}
              onConnect={connectInteg}
              onImport={importTasks}
              onSync={doSync}
            />
          ) : sections.length===0 ? (
            <div style={{
              display:'flex',flexDirection:'column',alignItems:'center',
              justifyContent:'center',paddingTop:60,gap:14,color:'var(--text3)',
            }}>
              <div style={{
                width:64,height:64,borderRadius:20,background:'var(--card)',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:28,boxShadow:'var(--sh)',
              }}>
                ✓
              </div>
              <p style={{fontSize:15,fontWeight:600,color:'var(--text2)'}}>
                {view==='completed'?'No completed tasks yet':'All clear — add a task above'}
              </p>
            </div>
          ) : (
            sections.map(function(sec){
              return (
                <TaskSection
                  key={sec.title}
                  title={sec.title}
                  tasks={sec.tasks}
                  selectedId={selectedId}
                  onToggle={toggleTask}
                  onSelect={selectTask}
                />
              );
            })
          )}
          </div>
        </div>
      </div>

      {/* Detail panel — desktop only */}
      {selectedTask && (
        <DetailPanel
          key={selectedTask.id}
          task={selectedTask}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onClose={function(){setSelectedId(null);}}
        />
      )}

      {/* Detail sheet — mobile only */}
      {selectedTask && (
        <DetailSheet
          key={'sheet-'+selectedTask.id}
          task={selectedTask}
          onUpdate={updateTask}
          onDelete={deleteTask}
          onClose={function(){setSelectedId(null);}}
        />
      )}

      {/* FAB — mobile only */}
      <div
        className="fab"
        onClick={function(){setNlp({input:'',parsed:{title:'',dueDate:null,dueTime:null}});}}
      >
        {ICO.plus}
      </div>

      {/* Bottom nav — mobile only */}
      <BottomNav view={view} setView={handleSetView} urgBadge={urgBadge} />

      {/* NLP modal */}
      {nlp && (
        <AddModal
          input={nlp.input}
          parsed={nlp.parsed}
          onConfirm={confirmAdd}
          onCancel={function(){setNlp(null);}}
        />
      )}
    </div>
  );
}

/* ─── MOUNT ──────────────────────────────────────────────── */
var SHADOW = '0 2px 12px rgba(0,0,0,.06)';
document.getElementById('loading').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
